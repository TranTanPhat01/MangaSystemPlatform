services:
  postgres:
    image: postgres:16
    container_name: manga-postgres
    environment:
      POSTGRES_USER: manga
      POSTGRES_PASSWORD: manga
      POSTGRES_DB: manga_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: manga-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7
    container_name: manga-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: manga-minio
    environment:
      MINIO_ROOT_USER: manga
      MINIO_ROOT_PASSWORD: manga123456
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
